name: Build and Push My Docker Image

on:
  push:
    branches:
      - main  # Change to main if needed!

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker Container
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest

      # --- THE NEW CONTINUOUS DEPLOYMENT STEP ---
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # 1. Download the newest image from the warehouse
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest
            
            # 2. Stop and remove the old running container (the || true ignores errors if it's the first run)
            sudo docker stop my-live-website || true
            sudo docker rm my-live-website || true
            
            # 3. Run the new container and give it a name so we can easily stop it next time!
            sudo docker run -d --name my-live-website -p 80:80 ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest