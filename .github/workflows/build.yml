name: Build and Push My Docker Image

on:
  push:
    branches:
      - main  # Change to 'main' if your default branch is main!

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Use the keys to unlock your Docker Hub warehouse
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build the Image (Notice we added your username to the tag!)
      - name: Build the Docker Container
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest .

      # Step D: Upload it to the warehouse
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-first-website:latest
